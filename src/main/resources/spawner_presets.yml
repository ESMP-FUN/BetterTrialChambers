# =============================================================================
# BetterTrialChambers - Spawner Presets (v1.3.1+)
# =============================================================================
#
# Named templates for `minecraft:trial_spawner` items. Each preset can be
# handed out via:
#
#     /trial give <preset> [player] [amount]
#
# The given item is a real trial_spawner block — placing it in the world
# produces a working spawner with the configured normal_config / ominous_config
# / cooldown / range etc. baked in (via the `block_entity_data` data
# component, the same NBT vanilla `/give` accepts).
#
# IMPORTANT: `normal_config` and `ominous_config` are RESOURCE LOCATIONS
# pointing at trial-spawner configs DEFINED IN A DATAPACK. The plugin does
# NOT generate these for you — install or write the datapack separately. See:
#   https://minecraft.wiki/w/Trial_Spawner#Spawner_configuration
#
# Hardening note: there is intentionally NO `material:` field. Every preset
# always produces a TRIAL_SPAWNER. Custom keys / vault crates / loot-box
# items are out of scope for this file (they belong to the planned premium
# "Vault Crate" module).
#
# ABOUT REST TIMES (`target-cooldown-length`):
# This is how long a spawner rests after players beat its wave, before it can be
# used again. It is written in ticks — 20 ticks is one second, so 36000 is
# 30 minutes, the same as normal Minecraft.
#
# If you write a rest time into a preset, spawners placed from that preset use
# it, and the server-wide setting in config.yml (reset.spawner-cooldown-minutes)
# is ignored for them. The thinking is that if you took the trouble to write a
# number here, you meant it.
#
# If you LEAVE THE LINE OUT, spawners from that preset simply follow the
# server-wide setting like any other spawner. That is usually the easier choice —
# you set the rest time once in config.yml and every spawner obeys it.
#
# If you would rather force every spawner onto the server-wide setting, presets
# included, set reset.spawner-cooldown-overrides-presets to true in config.yml.
#
# Reload after edits with:  /trial reload
# =============================================================================

presets:

  # Example: a tougher zombie spawner. Replace these config IDs with ones
  # from your own datapack — these references are illustrative only and will
  # error-log at item-place time if your server doesn't have a matching
  # datapack registered.
  #
  # super_zombie:
  #   normal-config: "namespace:basic_zombie"
  #   ominous-config: "namespace:basic_zombie_o"
  #   required-player-range: 14
  #   target-cooldown-length: 36000   # optional; 36000 ticks = 30 minutes.
  #                                   # Leave this line out to follow the
  #                                   # server-wide setting in config.yml.
  #   display-name: "&6Super Zombie Spawner"
  #   lore:
  #     - "&7A custom trial spawner."
  #     - "&7Place to deploy."

  # Optional fields you can add to any preset. They OVERRIDE the values from
  # the datapack config and are applied to the spawner block when it is
  # placed (vanilla defaults shown):
  #   total-mobs: 6
  #   simultaneous-mobs: 2
  #   total-mobs-added-per-player: 2.0
  #   simultaneous-mobs-added-per-player: 1.0
  #   ticks-between-spawn: 40
  #   spawn-range: 4
