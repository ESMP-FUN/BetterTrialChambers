name: BetterTrialChambers
version: ${version}
main: com.esmpfun.bettertrialchambers.BetterTrialChambers
api-version: '1.21'
prefix: BTC
load: POSTWORLD
authors: [ darkstarworks ]
description: Advanced Trial Chamber management for multiplayer servers with automatic resets, per-player vault loot, and custom rewards
website: https://github.com/ESMP-FUN/BetterTrialChambers
folia-supported: true

softdepend: [Vault, WorldGuard, WorldEdit, PlaceholderAPI, Residence, Lands, GriefPrevention, AdvancedEnchantments, MythicMobs, EliteMobs, Eco, EcoMobs, LevelledMobs, InfernalMobs, Citizens]

commands:
  trial:
    description: Main Better Trial Chambers command
    usage: /<command> [args]
    aliases: [btc, tcp, bettertrialchambers, chamber]

permissions:
  btc.admin.*:
    description: All admin permissions
    default: op
    children:
      btc.admin.scan: true
      btc.admin.snapshot: true
      btc.admin.reset: true
      btc.admin.key: true
      btc.admin.vault: true
      btc.admin.reload: true
      btc.admin.stats: true
      btc.admin.generate: true
      btc.admin.create: true
      btc.admin.menu: true
      btc.admin.pause: true
      btc.admin.loot: true
      btc.admin.containers: true
      btc.admin.mobs: true
      btc.admin.setup: true
      btc.admin: true
      btc.give: true
  btc.admin:
    description: General admin access (/trial list, /trial info, update notifications)
    default: op
  btc.admin.setup:
    description: Run the /trial setup settings tour and receive its reminder
    default: op
  btc.admin.scan:
    description: Scan for chambers
    default: op
  btc.admin.snapshot:
    description: Manage snapshots
    default: op
  btc.admin.reset:
    description: Force-reset chambers
    default: op
  btc.admin.key:
    description: Manage trial keys
    default: op
  btc.admin.vault:
    description: Manage vaults
    default: op
  btc.admin.reload:
    description: Reload configuration
    default: op
  btc.admin.stats:
    description: View other player's statistics
    default: op
  btc.admin.generate:
    description: Register chambers from coordinates or blocks
    default: op
  btc.admin.create:
    description: Delete chambers and set chamber exit points (/trial delete, /trial setexit)
    default: op
  btc.admin.menu:
    description: Open the admin GUI menu
    default: op
  btc.admin.pause:
    description: Pause or resume chambers via /trial pause and /trial resume
    default: op
  btc.stats:
    description: View own statistics
    default: true
  btc.leaderboard:
    description: View leaderboards
    default: true
  btc.bypass.cooldown:
    description: Bypass vault cooldowns
    default: op
  btc.bypass.protection:
    description: Bypass chamber protection
    default: op
  btc.bypass.droplock:
    description: Bypass owner-only pickup restrictions on vault loot and spawner key drops
    default: op
  btc.bypass.vaultplace:
    description: Place VAULT blocks outside registered chambers (crate setup, creative builds)
    default: op
  btc.bypass.residence:
    description: Create or expand Residence claims that overlap a registered Trial Chamber
    default: op
  btc.bypass.lands:
    description: Create or expand Lands claims that overlap a registered Trial Chamber
    default: op
  btc.bypass.griefprevention:
    description: Create or expand GriefPrevention claims that overlap a registered Trial Chamber
    default: op
  btc.bypass.entry:
    description: Enter chambers when entry/teleport restrictions are on (prevent-teleport-into-chamber / prevent-entry-without-permission)
    default: op
  btc.admin.loot:
    description: Manage per-chamber loot tables (/trial loot set/clear/audit)
    default: op
  btc.admin.containers:
    description: Edit per-player container loot templates (sneak-click in-world, /trial container, and the GUI)
    default: op
  btc.admin.mobs:
    description: Manage per-chamber custom mob provider configuration
    default: op
  btc.spectate:
    description: Use spectator mode after death in chambers
    default: true
  btc.give:
    description: Receive preconfigured trial-spawner items via /trial give
    default: op
  btc.discovery.notify:
    description: Receive notifications when auto-discovery registers a new chamber
    default: op

  # ==== Legacy permission aliases (pre-2.0 'tcp.*' nodes grant their 'btc.*' counterparts) ====
  tcp.admin.*:
    description: Legacy alias of btc.admin.*
    default: false
    children:
      btc.admin.*: true
