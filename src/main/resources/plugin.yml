name: TrialChamberPro
version: ${version}
main: io.github.darkstarworks.trialChamberPro.TrialChamberPro
api-version: '1.21'
prefix: TCP
load: POSTWORLD
authors: [ darkstarworks ]
description: Advanced Trial Chamber management for multiplayer servers with automatic resets, per-player vault loot, and custom rewards
website: https://github.com/darkstarworks/TrialChamberPro
folia-supported: true

softdepend: [Vault, WorldGuard, WorldEdit, PlaceholderAPI, Residence, Lands, GriefPrevention, AdvancedEnchantments, MythicMobs, EliteMobs, Eco, EcoMobs, LevelledMobs, InfernalMobs, Citizens]

commands:
  tcp:
    description: Main TrialChamberPro command
    usage: /<command> [args]
    permission: tcp.admin
    aliases: [trialchamberpro, tcpro, chamber]

permissions:
  tcp.admin.*:
    description: All admin permissions
    default: op
    children:
      tcp.admin.scan: true
      tcp.admin.snapshot: true
      tcp.admin.reset: true
      tcp.admin.key: true
      tcp.admin.vault: true
      tcp.admin.reload: true
      tcp.admin.stats: true
      tcp.admin.generate: true
      tcp.admin.create: true
      tcp.admin.menu: true
      tcp.admin.pause: true
      tcp.admin.loot: true
      tcp.admin.containers: true
      tcp.admin.mobs: true
      tcp.give: true
  tcp.admin.scan:
    description: Scan for chambers
    default: op
  tcp.admin.snapshot:
    description: Manage snapshots
    default: op
  tcp.admin.reset:
    description: Force-reset chambers
    default: op
  tcp.admin.key:
    description: Manage trial keys
    default: op
  tcp.admin.vault:
    description: Manage vaults
    default: op
  tcp.admin.reload:
    description: Reload configuration
    default: op
  tcp.admin.stats:
    description: View other player's statistics
    default: op
  tcp.admin.generate:
    description: Register chambers from coordinates or blocks
    default: op
  tcp.admin.create:
    description: Delete chambers and set chamber exit points (/tcp delete, /tcp setexit)
    default: op
  tcp.admin.menu:
    description: Open the admin GUI menu
    default: op
  tcp.admin.pause:
    description: Pause or resume chambers via /tcp pause and /tcp resume
    default: op
  tcp.stats:
    description: View own statistics
    default: true
  tcp.leaderboard:
    description: View leaderboards
    default: true
  tcp.bypass.cooldown:
    description: Bypass vault cooldowns
    default: op
  tcp.bypass.protection:
    description: Bypass chamber protection
    default: op
  tcp.bypass.droplock:
    description: Bypass owner-only pickup restrictions on vault loot and spawner key drops
    default: op
  tcp.bypass.vaultplace:
    description: Place VAULT blocks outside registered chambers (crate setup, creative builds)
    default: op
  tcp.bypass.residence:
    description: Create or expand Residence claims that overlap a registered Trial Chamber
    default: op
  tcp.bypass.lands:
    description: Create or expand Lands claims that overlap a registered Trial Chamber
    default: op
  tcp.bypass.griefprevention:
    description: Create or expand GriefPrevention claims that overlap a registered Trial Chamber
    default: op
  tcp.bypass.entry:
    description: Enter chambers when entry/teleport restrictions are on (prevent-teleport-into-chamber / prevent-entry-without-permission)
    default: op
  tcp.admin.loot:
    description: Manage per-chamber loot tables (/tcp loot set/clear/audit)
    default: op
  tcp.admin.containers:
    description: Edit per-player container loot templates (sneak-click in-world, /tcp container, and the GUI)
    default: op
  tcp.admin.mobs:
    description: Manage per-chamber custom mob provider configuration
    default: op
  tcp.spectate:
    description: Use spectator mode after death in chambers
    default: true
  tcp.give:
    description: Receive preconfigured trial-spawner items via /tcp give
    default: op
  tcp.discovery.notify:
    description: Receive notifications when auto-discovery registers a new chamber
    default: op
